<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Log Time — ServiceNow → MyTime</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #e2e8f0;
      padding: 20px; width: 380px;
    }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 16px;
    }
    h1 { font-size: 15px; font-weight: 600; color: #f1f5f9; }
    p.sub { font-size: 11px; color: #64748b; }

    .ticket-card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 10px; padding: 12px 14px; margin-bottom: 16px;
    }
    .ticket-number { font-size: 11px; font-weight: 700; color: #818cf8; margin-bottom: 4px; }
    .ticket-desc { font-size: 13px; color: #cbd5e1; line-height: 1.4; }
    .ticket-meta { font-size: 11px; color: #64748b; margin-top: 4px; }

    label {
      display: block; font-size: 11px; font-weight: 600;
      color: #94a3b8; text-transform: uppercase; letter-spacing: .05em;
      margin-bottom: 5px;
    }
    input {
      width: 100%; background: #1e293b; border: 1px solid #334155;
      border-radius: 7px; color: #f1f5f9; font-size: 14px;
      padding: 10px 12px; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: #6366f1; }
    .form-group { margin-bottom: 14px; }

    .actions { display: flex; gap: 10px; margin-top: 18px; }
    button { flex: 1; padding: 11px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
    .btn-cancel { background: #1e293b; border: 1px solid #334155; color: #94a3b8; flex: 0 0 auto; padding: 11px 16px; }

    .note { font-size: 10px; color: #475569; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">⏱</div>
    <div>
      <h1>Log Time to MyTime</h1>
      <p class="sub">Task closed — enter hours to book</p>
    </div>
  </div>

  <div class="ticket-card">
    <div class="ticket-number" id="ticketNumber">Loading…</div>
    <div class="ticket-desc" id="ticketDesc">—</div>
    <div class="ticket-meta" id="ticketMeta">—</div>
  </div>

  <div class="form-group">
    <label>Hours Worked</label>
    <input type="number" id="hours" min="0.25" max="24" step="0.25" placeholder="e.g. 1.5" autofocus />
  </div>

  <div class="form-group">
    <label>Date</label>
    <input type="date" id="bookingDate" />
  </div>

  <div class="actions">
    <button class="btn-cancel" id="btnCancel">Cancel</button>
    <button class="btn-primary" id="btnSubmit">Open MyTime ➜</button>
  </div>

  <p class="note">MyTime opens — fill TERP yourself, hours & date will be pre-filled.</p>

  <script src="dialog.js"></script>
</body>
</html>
