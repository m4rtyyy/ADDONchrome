<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ServiceNow → MyTime</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #e2e8f0;
      width: 320px; padding: 16px;
    }
    .header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .icon {
      width:30px; height:30px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      border-radius:7px; display:flex; align-items:center;
      justify-content:center; font-size:15px;
    }
    h1 { font-size:13px; font-weight:700; color:#f1f5f9; }
    p.sub { font-size:11px; color:#64748b; }

    .section { margin-bottom:14px; }
    .section-title {
      font-size:10px; font-weight:700; color:#475569;
      text-transform:uppercase; letter-spacing:.06em;
      margin-bottom:8px;
    }

    .status-row {
      display:flex; align-items:center; justify-content:space-between;
      background:#1e293b; border:1px solid #334155;
      border-radius:8px; padding:9px 12px;
      font-size:12px;
    }
    .dot { width:8px; height:8px; border-radius:50%; margin-right:6px; }
    .dot.green { background:#22c55e; }
    .dot.gray  { background:#475569; }

    toggle-label { display:flex; align-items:center; }

    .toggle {
      position:relative; width:34px; height:20px;
    }
    .toggle input { opacity:0; width:0; height:0; }
    .slider {
      position:absolute; inset:0; background:#334155;
      border-radius:20px; cursor:pointer; transition:.2s;
    }
    .slider:before {
      content:''; position:absolute;
      width:14px; height:14px; left:3px; bottom:3px;
      background:white; border-radius:50%; transition:.2s;
    }
    input:checked + .slider { background:#6366f1; }
    input:checked + .slider:before { transform:translateX(14px); }

    .terp-list {
      background:#1e293b; border:1px solid #334155;
      border-radius:8px; max-height:160px; overflow-y:auto;
    }
    .terp-item {
      display:grid; grid-template-columns:1fr auto auto;
      align-items:center; gap:6px;
      padding:7px 10px; border-bottom:1px solid #1e293b;
      font-size:11px;
    }
    .terp-item:last-child { border-bottom:none; }
    .terp-name { color:#cbd5e1; }
    .terp-code { color:#818cf8; font-weight:600; }
    .terp-del  { color:#475569; cursor:pointer; font-size:13px; }
    .terp-del:hover { color:#ef4444; }

    .add-row {
      display:grid; grid-template-columns:1fr 90px 60px auto;
      gap:5px; margin-top:8px;
    }
    .add-row input {
      background:#1e293b; border:1px solid #334155;
      border-radius:6px; color:#f1f5f9; font-size:11px;
      padding:6px 8px; outline:none;
    }
    .add-row input:focus { border-color:#6366f1; }
    .btn-add {
      background:#6366f1; border:none; border-radius:6px;
      color:white; font-size:12px; font-weight:600;
      cursor:pointer; padding:6px;
    }

    .footer {
      font-size:10px; color:#334155; text-align:center;
      margin-top:10px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="icon">⏱</div>
    <div>
      <h1>ServiceNow → MyTime</h1>
      <p class="sub">Auto time logger</p>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Status</div>
    <div class="status-row">
      <div style="display:flex;align-items:center">
        <div class="dot green" id="statusDot"></div>
        <span id="statusText">Watching ServiceNow</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="enableToggle" checked />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">TERP Overrides <span style="color:#475569;font-weight:400">(customer → TERP)</span></div>
    <div class="terp-list" id="terpList"></div>
    <div class="add-row">
      <input id="addName"  placeholder="Customer name" />
      <input id="addTerp"  placeholder="TERP code" />
      <input id="addTask"  placeholder="Task" />
      <button class="btn-add" id="addBtn">+</button>
    </div>
  </div>

  <div class="footer">v1.0.0 · ServiceNow → MyTime</div>

  <script src="popup.js"></script>
</body>
</html>
